nelmio_cors:
    defaults:
        allow_credentials: true
        allow_origin: ['http://localhost']
        allow_headers: ['Authorization', 'Content-Type']
        allow_methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS', 'PATCH']
        max_age: 3600
    paths:
        '^/api/':
            allow_origin: ['http://localhost']
            allow_headers: ['Authorization', 'Content-Type']
            allow_methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS', 'PATCH']
            max_age: 3600